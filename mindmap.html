<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Awesome Credit Modeling Mind Map</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5d6972;
      --line: #9bb1bf;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --root: #0f766e;
      --section: #245b8f;
      --paper: #6b4f20;
      --accent: #b42318;
      --shadow: 0 14px 32px rgba(23, 32, 38, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      color: var(--ink);
      background: var(--bg);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid #d8dfdf;
      box-shadow: 0 1px 2px rgba(23, 32, 38, 0.06);
      z-index: 4;
    }

    .title {
      min-width: 220px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .control {
      height: 34px;
      border: 1px solid #b9c6c8;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button.control {
      padding: 0 11px;
      cursor: pointer;
    }

    button.control:hover,
    button.control:focus-visible {
      border-color: #245b8f;
      outline: none;
    }

    input.control {
      width: min(34vw, 360px);
      padding: 0 10px;
    }

    select.control {
      padding: 0 8px;
    }

    .voice-listening {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.14);
    }

    .workspace {
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    .workspace.dragging {
      cursor: grabbing;
    }

    .map {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      transform-origin: 0 0;
    }

    .links {
      position: absolute;
      left: 0;
      top: 0;
      overflow: visible;
      pointer-events: none;
    }

    .links path {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .node {
      position: absolute;
      width: 260px;
      min-height: 52px;
      padding: 10px 12px;
      border: 1px solid #b7c3c7;
      border-left: 5px solid var(--paper);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      cursor: default;
      user-select: none;
    }

    .node.root {
      width: 280px;
      border-left-color: var(--root);
    }

    .node.section {
      border-left-color: var(--section);
    }

    .node.paper {
      border-left-color: var(--paper);
    }

    .node.match {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.16), var(--shadow);
    }

    .node.focused {
      outline: 3px solid rgba(15, 118, 110, 0.28);
    }

    .node-title {
      margin: 0 0 5px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .node-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .node-actions {
      display: flex;
      gap: 6px;
      margin-top: 9px;
    }

    .node-actions button,
    .node-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 26px;
      min-width: 26px;
      padding: 0 8px;
      border: 1px solid #c3cccd;
      border-radius: 5px;
      background: #f8faf9;
      color: var(--ink);
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }

    .node-actions button:hover,
    .node-actions a:hover {
      border-color: var(--section);
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .toolbar {
        flex-wrap: wrap;
      }

      .title {
        width: 100%;
        min-width: 0;
      }

      input.control {
        width: 100%;
        flex: 1 1 100%;
      }

      select.control,
      button.control {
        flex: 1 1 auto;
      }

      .status {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="title">Awesome Credit Modeling Map</div>
      <input id="search" class="control" type="search" placeholder="Search papers, topics, methods">
      <select id="speechLang" class="control" aria-label="Speech language">
        <option value="zh-CN">中文</option>
        <option value="en-US">English</option>
      </select>
      <button id="voiceSearch" class="control" type="button">Voice</button>
      <button id="expandAll" class="control" type="button">Expand</button>
      <button id="collapseAll" class="control" type="button">Collapse</button>
      <button id="zoomIn" class="control" type="button">Zoom In</button>
      <button id="zoomOut" class="control" type="button">Zoom Out</button>
      <button id="reset" class="control" type="button">Reset</button>
      <div id="status" class="status"></div>
    </header>

    <main id="workspace" class="workspace" aria-label="Interactive credit modeling mind map">
      <div id="map" class="map">
        <svg id="links" class="links" aria-hidden="true"></svg>
        <div id="nodes"></div>
      </div>
    </main>
  </div>

  <script>
    const tree = {
      id: "root",
      title: "Awesome Credit Modeling",
      type: "root",
      meta: "Frontier credit modeling: alternative data, transformers, reinforcement learning, LLMs, agents, sampling bias, and governance.",
      children: [
        {
          id: "surveys",
          title: "Recent Surveys and Market Context",
          type: "section",
          children: [
            paper("survey-1", "Credit scoring methods: Latest trends and points to consider", "Survey of recent credit scoring work from 2016 to 2021.", "https://www.sciencedirect.com/science/article/pii/S2405918822000095"),
            paper("survey-2", "Fintech and big tech credit: a new database", "BIS context for fintech, platform lending, and alternative credit markets.", "https://www.bis.org/publ/work887.pdf"),
            paper("survey-3", "FinBen", "Financial LLM benchmark covering risk management, decisions, agents, and RAG.", "https://arxiv.org/abs/2402.12659")
          ]
        },
        {
          id: "credit-scoring",
          title: "Credit Scoring",
          type: "section",
          children: [
            paper("cs-1", "Super-App Behavioral Patterns in Credit Risk Models", "Alternative app-based marketplace data for underserved credit modeling.", "https://arxiv.org/abs/2005.14658"),
            paper("cs-2", "Machine learning predictivity applied to consumer creditworthiness", "Modern ML models on bank loan data compared against logistic regression.", "https://fbj.springeropen.com/articles/10.1186/s43093-020-00041-w")
          ]
        },
        {
          id: "transformers",
          title: "Deep Learning and Transformers",
          type: "section",
          children: [
            paper("tr-1", "Feature Embedded Transformer", "Transformer over online behavioral data fused with wide credit features.", "https://www.mdpi.com/2076-3417/12/21/10995"),
            paper("tr-2", "SHAP for Deep Credit Scoring with Open Banking Data", "Explains BERT and deep models trained on transaction descriptions.", "https://www.mdpi.com/1911-8074/16/4/221"),
            paper("tr-3", "Credit Risk Meets Large Language Models", "BERT-derived loan description risk score for P2P lending.", "https://arxiv.org/abs/2401.16458")
          ]
        },
        {
          id: "institutional",
          title: "Institutional Credit Risk",
          type: "section",
          children: [
            paper("icr-1", "Modeling Institutional Credit Risk with Financial News", "Downgrade risk modeling using news embeddings.", "https://arxiv.org/abs/2004.08204"),
            paper("icr-2", "Forecasting Credit Ratings", "Case study where structured features and text embeddings outperform generative LLM baselines.", "https://arxiv.org/abs/2407.17624")
          ]
        },
        {
          id: "p2p",
          title: "Peer-to-Peer Lending",
          type: "section",
          children: [
            paper("p2p-1", "Network based credit risk models", "Borrower similarity networks and centrality features for P2P credit risk.", "https://www.tandfonline.com/doi/abs/10.1080/08982112.2019.1655159"),
            paper("p2p-2", "Credit Risk Meets Large Language Models", "BERT-derived loan description risk score for P2P lending.", "https://arxiv.org/abs/2401.16458")
          ]
        },
        {
          id: "rl",
          title: "Reinforcement Learning and Dynamic Decisions",
          type: "section",
          children: [
            paper("rl-1", "Offline Deep Reinforcement Learning for Dynamic Pricing of Consumer Credit", "Conservative Q-learning for personalized consumer credit pricing.", "https://arxiv.org/abs/2203.03003"),
            paper("rl-2", "Balanced Stratified Prioritized Experience Replay", "Deep RL for P2P customer credit scoring under class imbalance.", "https://link.springer.com/article/10.1007/s10462-023-10697-9"),
            paper("rl-3", "Cost-sensitive reinforcement learning for credit risk", "Bandit and online learning methods for dynamic amount-dependent credit costs.", "https://www.sciencedirect.com/science/article/pii/S0957417425003306")
          ]
        },
        {
          id: "llm-agents",
          title: "LLMs and Financial Agents",
          type: "section",
          children: [
            paper("llm-1", "Generalist Credit Scoring through Large Language Models", "CALM instruction-tuned credit and risk assessment LLM with bias analysis.", "https://arxiv.org/abs/2310.00566"),
            paper("llm-2", "LLM-FP-CatBoost for Fintech Lending", "LLM narrative extraction plus FocalPoly loss for imbalanced lending data.", "https://www.sciencedirect.com/science/article/pii/S0169207024000724"),
            paper("llm-3", "Forecasting Credit Ratings", "Case study where XGBoost with fundamentals and text embeddings beats generative LLMs.", "https://arxiv.org/abs/2407.17624"),
            paper("llm-4", "FinBen", "Financial LLM benchmark covering risk management, forecasting, decisions, agents, and RAG.", "https://arxiv.org/abs/2402.12659"),
            paper("llm-5", "MASCA", "LLM multi-agent system for credit assessment with specialized agents and bias analysis.", "https://arxiv.org/abs/2507.22758")
          ]
        },
        {
          id: "sample-selection",
          title: "Sample Selection and Bias",
          type: "section",
          children: [
            paper("ss-1", "Fighting Sampling Bias", "Bias-aware self-learning and Bayesian scorecard evaluation.", "https://arxiv.org/abs/2407.13009"),
            paper("ss-2", "Generalist Credit Scoring through Large Language Models", "Bias and fairness analysis for LLM-based credit decisions.", "https://arxiv.org/abs/2310.00566")
          ]
        },
        {
          id: "explainability",
          title: "Model Explainability and Governance",
          type: "section",
          children: [
            paper("xai-1", "SHAP for Deep Credit Scoring with Open Banking Data", "Explains BERT and deep models trained on transaction descriptions.", "https://www.mdpi.com/1911-8074/16/4/221"),
            paper("xai-2", "Regulatory learning", "Supervision and model switching for ML credit scoring.", "https://www.sciencedirect.com/science/article/pii/S2405918817300648")
          ]
        }
      ]
    };

    const collapsed = new Set();
    const nodeIndex = new Map();
    const workspace = document.getElementById("workspace");
    const mapEl = document.getElementById("map");
    const nodesEl = document.getElementById("nodes");
    const linksEl = document.getElementById("links");
    const statusEl = document.getElementById("status");
    const searchEl = document.getElementById("search");
    const speechLangEl = document.getElementById("speechLang");
    const voiceSearchEl = document.getElementById("voiceSearch");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const layout = { xGap: 350, yGap: 30, paperH: 104, sectionH: 74, rootH: 82 };
    let positions = new Map();
    let scale = 0.82;
    let offset = { x: 80, y: 120 };
    let focused = "root";
    let dragState = null;
    let matches = new Set();
    let recognition = null;
    let isListening = false;
    let statusMessage = "";

    indexTree(tree);
    render();
    resetView();
    setupSpeechInput();

    document.getElementById("expandAll").addEventListener("click", () => {
      collapsed.clear();
      render();
    });

    document.getElementById("collapseAll").addEventListener("click", () => {
      tree.children.forEach((child) => collapsed.add(child.id));
      searchEl.value = "";
      matches.clear();
      render();
    });

    document.getElementById("zoomIn").addEventListener("click", () => setScale(scale * 1.15));
    document.getElementById("zoomOut").addEventListener("click", () => setScale(scale / 1.15));
    document.getElementById("reset").addEventListener("click", resetView);

    searchEl.addEventListener("input", () => {
      applySearch(searchEl.value);
    });

    workspace.addEventListener("pointerdown", (event) => {
      if (event.target.closest(".node")) return;
      workspace.setPointerCapture(event.pointerId);
      workspace.classList.add("dragging");
      dragState = { x: event.clientX, y: event.clientY, ox: offset.x, oy: offset.y };
    });

    workspace.addEventListener("pointermove", (event) => {
      if (!dragState) return;
      offset.x = dragState.ox + event.clientX - dragState.x;
      offset.y = dragState.oy + event.clientY - dragState.y;
      applyTransform();
    });

    workspace.addEventListener("pointerup", () => {
      dragState = null;
      workspace.classList.remove("dragging");
    });

    workspace.addEventListener("wheel", (event) => {
      event.preventDefault();
      const nextScale = scale * (event.deltaY > 0 ? 0.92 : 1.08);
      setScale(nextScale, event.clientX, event.clientY);
    }, { passive: false });

    function paper(id, title, meta, url) {
      return { id, title, meta, url, type: "paper", children: [] };
    }

    function setupSpeechInput() {
      if (!SpeechRecognition) {
        voiceSearchEl.disabled = true;
        voiceSearchEl.textContent = "No Voice";
        voiceSearchEl.title = "Speech input is available in Chrome or Edge.";
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.addEventListener("result", (event) => {
        let transcript = "";
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          transcript += event.results[index][0].transcript;
        }
        searchEl.value = transcript.trim();
        applySearch(searchEl.value);
      });

      recognition.addEventListener("start", () => {
        isListening = true;
        statusMessage = speechLangEl.value === "zh-CN" ? "Listening in Chinese" : "Listening in English";
        voiceSearchEl.classList.add("voice-listening");
        voiceSearchEl.textContent = "Listening";
        statusEl.textContent = statusMessage;
      });

      recognition.addEventListener("end", () => {
        isListening = false;
        if (statusMessage.startsWith("Listening")) {
          statusMessage = "";
        }
        voiceSearchEl.classList.remove("voice-listening");
        voiceSearchEl.textContent = "Voice";
        render();
      });

      recognition.addEventListener("error", (event) => {
        isListening = false;
        statusMessage = event.error === "not-allowed" ? "Microphone permission denied" : `Voice input error: ${event.error}`;
        voiceSearchEl.classList.remove("voice-listening");
        voiceSearchEl.textContent = "Voice";
        statusEl.textContent = statusMessage;
      });

      speechLangEl.addEventListener("change", () => {
        if (isListening) {
          recognition.stop();
        }
      });

      voiceSearchEl.addEventListener("click", () => {
        if (isListening) {
          recognition.stop();
          return;
        }
        recognition.lang = speechLangEl.value;
        try {
          recognition.start();
        } catch (error) {
          statusMessage = "Voice input could not start";
          statusEl.textContent = statusMessage;
        }
      });
    }

    function indexTree(node, parent = null) {
      node.parent = parent;
      nodeIndex.set(node.id, node);
      node.children.forEach((child) => indexTree(child, node));
    }

    function visibleChildren(node) {
      if (collapsed.has(node.id)) return [];
      return node.children;
    }

    function nodeHeight(node) {
      if (node.type === "root") return layout.rootH;
      if (node.type === "section") return layout.sectionH;
      return layout.paperH;
    }

    function measure(node) {
      const children = visibleChildren(node);
      if (!children.length) return nodeHeight(node);
      return Math.max(nodeHeight(node), children.reduce((sum, child) => sum + measure(child), 0) + layout.yGap * (children.length - 1));
    }

    function place(node, depth, top) {
      const blockHeight = measure(node);
      const children = visibleChildren(node);
      const ownHeight = nodeHeight(node);
      const x = depth * layout.xGap;
      const y = top + blockHeight / 2 - ownHeight / 2;
      positions.set(node.id, { x, y, w: node.type === "root" ? 280 : 260, h: ownHeight });
      let childTop = top;
      children.forEach((child) => {
        const childHeight = measure(child);
        place(child, depth + 1, childTop);
        childTop += childHeight + layout.yGap;
      });
      return blockHeight;
    }

    function render() {
      positions = new Map();
      const totalHeight = place(tree, 0, 0);
      const totalWidth = maxDepth(tree) * layout.xGap + 320;
      linksEl.setAttribute("width", totalWidth);
      linksEl.setAttribute("height", totalHeight + 220);
      linksEl.setAttribute("viewBox", `0 0 ${totalWidth} ${totalHeight + 220}`);
      linksEl.innerHTML = "";
      nodesEl.innerHTML = "";
      drawLinks(tree);
      drawNodes();
      if (statusMessage) {
        statusEl.textContent = statusMessage;
      } else if (!isListening) {
        statusEl.textContent = `${positions.size} visible nodes`;
      }
      applyTransform();
    }

    function drawLinks(node) {
      const from = positions.get(node.id);
      visibleChildren(node).forEach((child) => {
        const to = positions.get(child.id);
        const startX = from.x + from.w;
        const startY = from.y + from.h / 2;
        const endX = to.x;
        const endY = to.y + to.h / 2;
        const midX = startX + (endX - startX) * 0.52;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`);
        linksEl.appendChild(path);
        drawLinks(child);
      });
    }

    function drawNodes() {
      positions.forEach((pos, id) => {
        const node = nodeIndex.get(id);
        const el = document.createElement("article");
        el.className = `node ${node.type}${matches.has(id) ? " match" : ""}${focused === id ? " focused" : ""}`;
        el.style.left = `${pos.x}px`;
        el.style.top = `${pos.y}px`;
        el.style.minHeight = `${pos.h}px`;
        el.dataset.id = id;
        el.innerHTML = `
          <h2 class="node-title">${escapeHtml(node.title)}</h2>
          <div class="node-meta">${escapeHtml(node.meta || `${node.children.length} items`)}</div>
          <div class="node-actions">
            ${node.children.length ? `<button type="button" data-action="toggle">${collapsed.has(id) ? "Show" : "Hide"}</button>` : ""}
            <button type="button" data-action="focus">Focus</button>
            ${node.url ? `<a href="${node.url}" target="_blank" rel="noopener">Open</a>` : ""}
          </div>
        `;
        el.addEventListener("click", (event) => {
          const action = event.target.dataset.action;
          if (!action) return;
          if (action === "toggle") {
            if (collapsed.has(id)) collapsed.delete(id);
            else collapsed.add(id);
            render();
          }
          if (action === "focus") {
            focusNode(id);
          }
        });
        el.addEventListener("dblclick", () => {
          if (!node.children.length) return;
          if (collapsed.has(id)) collapsed.delete(id);
          else collapsed.add(id);
          render();
        });
        nodesEl.appendChild(el);
      });
    }

    function maxDepth(node, depth = 0) {
      const children = visibleChildren(node);
      if (!children.length) return depth;
      return Math.max(...children.map((child) => maxDepth(child, depth + 1)));
    }

    function findMatches(query) {
      const result = new Set();
      if (!query) return result;
      nodeIndex.forEach((node, id) => {
        const text = `${node.title} ${node.meta || ""}`.toLowerCase();
        if (text.includes(query)) result.add(id);
      });
      return result;
    }

    function applySearch(value) {
      const query = value.trim().toLowerCase();
      matches = findMatches(query);
      if (query) {
        expandParents(matches);
      }
      statusMessage = "";
      render();
    }

    function expandParents(ids) {
      ids.forEach((id) => {
        let node = nodeIndex.get(id);
        while (node && node.parent) {
          collapsed.delete(node.parent.id);
          node = node.parent;
        }
      });
    }

    function focusNode(id) {
      focused = id;
      const pos = positions.get(id);
      if (!pos) return;
      offset.x = workspace.clientWidth / 2 - (pos.x + pos.w / 2) * scale;
      offset.y = workspace.clientHeight / 2 - (pos.y + pos.h / 2) * scale;
      render();
    }

    function setScale(nextScale, anchorX, anchorY) {
      const oldScale = scale;
      scale = Math.min(1.75, Math.max(0.35, nextScale));
      if (anchorX !== undefined && anchorY !== undefined) {
        const rect = workspace.getBoundingClientRect();
        const px = anchorX - rect.left;
        const py = anchorY - rect.top;
        offset.x = px - (px - offset.x) * (scale / oldScale);
        offset.y = py - (py - offset.y) * (scale / oldScale);
      }
      applyTransform();
    }

    function resetView() {
      scale = 0.82;
      offset = { x: 70, y: Math.max(60, workspace.clientHeight * 0.12) };
      focused = "root";
      render();
    }

    function applyTransform() {
      mapEl.style.transform = `translate(${offset.x}px, ${offset.y}px) scale(${scale})`;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }
  </script>
</body>
</html>
